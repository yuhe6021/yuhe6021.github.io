<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你的名字 | GitHub 个人主页</title>
    <style>
        /* 全局重置 + 基础样式 纯黑白 无多余装饰 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* 标题样式 极简无修饰 */
        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
            letter-spacing: -0.3px;
        }

        h2 {
            font-size: 20px;
            font-weight: 500;
            margin: 40px 0 15px;
            border-top: 1px solid #000;
            padding-top: 20px;
        }

        /* 段落与链接 */
        p {
            font-size: 16px;
            margin-bottom: 12px;
            color: #222222;
        }

        a {
            color: #000000;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        a:hover {
            opacity: 0.6;
        }

        /* 列表样式 */
        ul {
            list-style: none;
            margin-bottom: 20px;
        }

        li {
            margin-bottom: 8px;
            padding-left: 1px;
        }

        /* 简介区域 */
        .bio {
            margin-bottom: 40px;
        }

        /* 页脚 */
        footer {
            margin-top: 80px;
            font-size: 14px;
            color: #555555;
        }
    </style>
</head>

<body>
    <!-- 头部 姓名 + 简介 -->
    <div class="bio">
        <h1>你的名字</h1>
        <p>极简主义开发者 | 专注于清晰、高效的代码</p>
        <p>欢迎访问我的 GitHub 主页</p>
    </div>

    <!-- 项目展示区 -->
    <h2>项目 Projects</h2>
    <ul>
        <li><a href="https://github.com/你的用户名/项目1" target="_blank">项目 1</a> - 简短描述</li>
        <li><a href="https://github.com/你的用户名/项目2" target="_blank">项目 2</a> - 简短描述</li>
        <li><a href="https://github.com/你的用户名/项目3" target="_blank">项目 3</a> - 简短描述</li>
    </ul>

    <!-- 联系方式 -->
    <h2>联系 Links</h2>
    <ul>
        <li><a href="https://github.com/你的用户名" target="_blank">GitHub</a></li>
        <li><a href="mailto:你的邮箱@gmail.com">Email</a></li>
    </ul>

    <!-- 页脚 -->
    <footer>
        <p>© 2025 你的名字 | 纯黑白极简主页</p>
    </footer>
</body>
</html>
